

app:
  name: "kelbi-jobs"
  image: "ghcr.io/invasor-de-fronteiras/kelbi-jobs:1.3.1"
  replicas: 0
config:
  env: kelbi-jobs-secrets
  port: 8080
resources:
  limits:
    cpu: 300m
    memory: 500Mi
  requests:
    cpu: 100m
    memory: 128Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
type: singleton
volumes:
  - name: static
    hostPath:
      path: /root/volumes/kelbi/static
      type: Directory
volumeMounts:
  - name: "static"
    mountPath: /data/assets
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
